name: Publish Custom Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 12.1.3-custom)'
        required: true

env:
  OCAMLRUNPARAM: b
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-compiler:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            ocaml_compiler: ocaml-variants.5.3.0+options,ocaml-option-static
            node-target: linux-x64
            rust-target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            ocaml_compiler: ocaml-variants.5.3.0+options,ocaml-option-static
            node-target: linux-arm64
            rust-target: aarch64-unknown-linux-musl
          - os: macos-15-intel
            ocaml_compiler: 5.3.0
            node-target: darwin-x64
            rust-target: x86_64-apple-darwin
          - os: macos-15
            ocaml_compiler: 5.3.0
            node-target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-2025
            ocaml_compiler: 5.3.0
            node-target: win32-x64
            rust-target: x86_64-pc-windows-gnu
            exe-suffix: ".exe"

    runs-on: ${{ matrix.os }}

    env:
      SETUP_OCAML_VERSION: 3.4.6

    steps:
      - name: "Windows: Set git config"
        if: runner.os == 'Windows'
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf
          git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc

      - name: Install npm packages
        run: yarn install

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: bubblewrap darcs g++-multilib gcc-multilib mercurial musl-tools rsync cmake
          version: v4

      - name: Restore rewatch build cache
        id: rewatch-build-cache
        uses: actions/cache@v5
        with:
          path: rewatch/target
          key: rewatch-build-v3-${{ matrix.rust-target }}-${{ hashFiles('rewatch/src/**', 'rewatch/Cargo.lock') }}

      - name: Determine Rust toolchain version
        id: rust-version
        shell: bash
        run: |
          version="$(awk -F '"' '/^rust-version[[:space:]]*=/ { print $2; exit }' rewatch/Cargo.toml)"
          if [ -z "$version" ]; then
            echo "rust-version missing in rewatch/Cargo.toml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install rust toolchain
        if: steps.rewatch-build-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: ${{ matrix.rust-target }}

      - name: Build rewatch
        if: steps.rewatch-build-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path rewatch/Cargo.toml --target ${{ matrix.rust-target }} --release

      - name: Copy rewatch binary
        run: |
          cp rewatch/target/${{ matrix.rust-target }}/release/rescript${{ matrix.exe-suffix }} rescript
          mkdir -p rewatch/target/release
          cp rewatch/target/${{ matrix.rust-target }}/release/rescript${{ matrix.exe-suffix }} rewatch/target/release
          ./scripts/copyExes.js --rewatch
        shell: bash

      - name: Get OPAM cache key
        shell: bash
        run: echo "opam_cache_key=opam-env-v8-${{ matrix.os }}-${{ env.SETUP_OCAML_VERSION }}-${{ matrix.ocaml_compiler }}-${{ hashFiles('*.opam') }}" | sed 's/,/-/g' >> $GITHUB_ENV

      - name: Restore OPAM environment
        id: cache-opam-env
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ runner.tool_cache }}/opam
            ~/.opam
            _opam
            .opam-path
            C:\cygwin
            C:\.opam
          key: ${{ env.opam_cache_key }}

      - name: Use OCaml ${{ matrix.ocaml_compiler }}
        uses: ocaml/setup-ocaml@v3.4.8
        if: steps.cache-opam-env.outputs.cache-hit != 'true'
        with:
          ocaml-compiler: ${{ matrix.ocaml_compiler }}
          opam-pin: false

      - name: Get OPAM executable path
        if: steps.cache-opam-env.outputs.cache-hit != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const opamPath = await io.which('opam', true);
            console.log('opam executable found: %s', opamPath);
            const fs = require('fs/promises');
            await fs.writeFile('.opam-path', opamPath, 'utf-8');

      - name: Install OPAM dependencies
        if: steps.cache-opam-env.outputs.cache-hit != 'true'
        run: opam install . --deps-only --with-test

      - name: Build compiler
        if: runner.os != 'Linux'
        run: opam exec -- dune build --display quiet --profile release

      - name: Build compiler (Linux static)
        if: runner.os == 'Linux'
        run: opam exec -- dune build --display quiet --profile static

      - name: Copy compiler exes to platform bin dir
        run: node scripts/copyExes.js --compiler

      - name: Build ninja
        if: runner.os != 'Linux'
        run: node scripts/buildNinjaBinary.js

      - name: Build ninja (Linux static)
        if: runner.os == 'Linux'
        env:
          LDFLAGS: -static
        run: node scripts/buildNinjaBinary.js

      - name: Copy ninja exe to platform bin dir
        run: node scripts/copyExes.js --ninja

      - name: Build @rescript/runtime
        run: yarn workspace @rescript/runtime build
        shell: bash

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.node-target }}
          path: packages/@rescript/${{ matrix.node-target }}/bin

      - name: Upload runtime lib
        if: matrix.node-target == 'linux-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: runtime-lib
          path: |
            packages/@rescript/runtime/lib

  publish:
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org
          node-version-file: .nvmrc

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to packages
        run: |
          mkdir -p packages/@rescript/darwin-arm64/bin
          mkdir -p packages/@rescript/darwin-x64/bin
          mkdir -p packages/@rescript/linux-arm64/bin
          mkdir -p packages/@rescript/linux-x64/bin
          mkdir -p packages/@rescript/win32-x64/bin

          cp -r artifacts/binaries-darwin-arm64/* packages/@rescript/darwin-arm64/bin/ || true
          cp -r artifacts/binaries-darwin-x64/* packages/@rescript/darwin-x64/bin/ || true
          cp -r artifacts/binaries-linux-arm64/* packages/@rescript/linux-arm64/bin/ || true
          cp -r artifacts/binaries-linux-x64/* packages/@rescript/linux-x64/bin/ || true
          cp -r artifacts/binaries-win32-x64/* packages/@rescript/win32-x64/bin/ || true

          # Download runtime lib
          cp -r artifacts/runtime-lib/* packages/@rescript/runtime/ || true
        shell: bash

      - name: Rename packages to @roshan84ya scope
        run: node scripts/rename-packages.js ${{ github.event.inputs.version }}

      - name: Publish platform packages
        run: |
          cd packages/@rescript/darwin-arm64 && npm publish --access public --tag custom
          cd ../darwin-x64 && npm publish --access public --tag custom
          cd ../linux-arm64 && npm publish --access public --tag custom
          cd ../linux-x64 && npm publish --access public --tag custom
          cd ../win32-x64 && npm publish --access public --tag custom
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public --tag custom
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
