name: Dev Playground

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to publish the selected ref to GitHub Pages.
        required: true
        type: string

concurrency:
  group: dev-playground-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  OCAMLRUNPARAM: b
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-Dwarnings"
  VITE_DEFAULT_COMPILER_VERSION: master
  VITE_COMPILER_VERSIONS: '[{"id":"master","label":"master"}]'
  GITHUB_PAGES_PATH: dev-playground
  PLAYGROUND_BUNDLE_ID: master

jobs:
  build:
    if: ${{ github.event_name == 'push' || github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-24.04-arm
    env:
      SETUP_OCAML_VERSION: 3.6.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc

      - name: Install npm packages
        run: yarn install

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: bubblewrap darcs g++-multilib gcc-multilib mercurial musl-tools rsync cmake
          version: v4

      - name: Determine Rust toolchain version
        id: rust-version
        shell: bash
        run: |
          version="$(awk -F '"' '/^rust-version[[:space:]]*=/ { print $2; exit }' rewatch/Cargo.toml)"
          if [ -z "$version" ]; then
            echo "rust-version missing in rewatch/Cargo.toml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}

      - name: Use OCaml
        uses: ocaml/setup-ocaml@v3.6.0
        with:
          ocaml-compiler: 5.3.0
          opam-pin: false

      - name: Install OPAM dependencies
        run: opam install . --deps-only --with-test

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build playground compiler
        run: opam exec -- make playground

      - name: Test playground compiler
        run: yarn workspace playground test

      - name: Build dev playground
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/dev-playground/
        run: |
          yarn workspace dev-playground stage-master-bundle
          yarn workspace dev-playground build
          yarn workspace dev-playground prepare-pages-site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/dev-playground/pages-site

  deploy:
    if: ${{ github.event_name == 'push' || github.event.inputs.confirm == 'deploy' }}
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dev-playground/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
